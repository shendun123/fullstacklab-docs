<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>全栈实验室操作文档</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">

  <style>
    :root {
      --theme-color: #2563eb;

      --sidebar-bg: #08111f;
      --sidebar-bg-2: #0f1d33;

      --page-bg: #f3f7ff;
      --content-bg: #f6f9ff;
      --card-bg: rgba(255, 255, 255, 0.92);

      --text-main: #0f172a;
      --text-body: #334155;
      --text-muted: #64748b;

      --cyan: #38bdf8;
      --blue: #2563eb;
      --purple: #7c3aed;

      --border: #dbe7f5;
      --border-soft: #e8eef7;
      --shadow: 0 20px 55px rgba(15, 23, 42, 0.08);
      --glow: 0 0 30px rgba(56, 189, 248, 0.24);
    }

    html,
    body {
      margin: 0;
      background:
        radial-gradient(circle at 86% 4%, rgba(56, 189, 248, 0.14), transparent 28%),
        radial-gradient(circle at 42% 108%, rgba(37, 99, 235, 0.08), transparent 32%),
        linear-gradient(180deg, #f8fbff 0%, var(--page-bg) 100%);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      overflow-x: hidden;
    }

    .sidebar {
      width: 312px;
      padding: 22px 18px;
      background:
        radial-gradient(circle at 18% 0%, rgba(56, 189, 248, 0.26), transparent 28%),
        radial-gradient(circle at 100% 100%, rgba(124, 58, 237, 0.20), transparent 30%),
        linear-gradient(180deg, var(--sidebar-bg) 0%, var(--sidebar-bg-2) 100%);
      border-right: 1px solid rgba(125, 211, 252, 0.16);
      box-shadow: 14px 0 44px rgba(2, 8, 23, 0.28);
    }

    .sidebar::before {
      content: "";
      position: fixed;
      left: 0;
      top: 0;
      width: 312px;
      height: 100vh;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(56, 189, 248, 0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56, 189, 248, 0.045) 1px, transparent 1px);
      background-size: 26px 26px;
      mask-image: linear-gradient(180deg, rgba(0,0,0,0.90), rgba(0,0,0,0.24));
    }

    .sidebar h1 {
      position: relative;
      z-index: 3;
      margin: 0 0 12px;
      padding: 20px 16px;
      border-radius: 20px;
      background:
        linear-gradient(135deg, rgba(15, 23, 42, 0.72), rgba(30, 64, 175, 0.30)),
        radial-gradient(circle at 100% 0%, rgba(56, 189, 248, 0.30), transparent 44%);
      border: 1px solid rgba(125, 211, 252, 0.24);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), var(--glow);
      color: #ffffff;
      font-size: 22px;
      font-weight: 850;
      line-height: 1.35;
      text-align: left;
      letter-spacing: 0.2px;
      overflow: hidden;
    }

    .sidebar h1 a {
      color: #ffffff;
      text-decoration: none;
    }

    .sidebar h1::after {
      content: "AI Operation Docs";
      display: block;
      margin-top: 8px;
      color: #7dd3fc;
      font-size: 12px;
      font-weight: 650;
      letter-spacing: 0.04em;
    }

    .search {
      margin: 0 0 20px;
      padding: 0;
      border-bottom: none;
      position: relative;
      z-index: 2;
    }

    .search input {
      box-sizing: border-box;
      width: 100%;
      height: 44px;
      padding: 0 14px;
      border: 1px solid rgba(125, 211, 252, 0.24);
      border-radius: 14px;
      background: rgba(15, 23, 42, 0.46);
      color: #e2e8f0;
      font-size: 14px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .search input::placeholder {
      color: #94a3b8;
    }

    .search input:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.22);
    }

    .sidebar-nav {
      position: relative;
      z-index: 1;
      padding-bottom: 54px;
    }

    .sidebar ul {
      margin: 0;
      padding: 0;
    }

    .sidebar li {
      margin: 5px 0;
    }

    .sidebar > .sidebar-nav > ul > li > p {
      margin: 20px 10px 8px;
      color: #7dd3fc;
      font-size: 12px;
      font-weight: 750;
      letter-spacing: 0.08em;
      opacity: 0.80;
    }

    .sidebar ul li a {
      display: block;
      padding: 11px 13px;
      border-radius: 14px;
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.55;
      text-decoration: none;
      transition: all 0.18s ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border: 1px solid transparent;
    }

    .sidebar ul li a:hover {
      background: rgba(56, 189, 248, 0.10);
      border-color: rgba(125, 211, 252, 0.16);
      color: #ffffff;
      transform: translateX(3px);
    }

    .sidebar ul li.active > a {
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.98) 0%, rgba(6, 182, 212, 0.92) 100%);
      color: #ffffff;
      font-weight: 750;
      border-color: rgba(186, 230, 253, 0.36);
      box-shadow: 0 14px 34px rgba(37, 99, 235, 0.32);
    }

    .content {
      left: 312px;
      min-height: 100vh;
      padding-top: 24px;
      background:
        radial-gradient(circle at 92% 10%, rgba(56, 189, 248, 0.14), transparent 28%),
        radial-gradient(circle at 18% 100%, rgba(37, 99, 235, 0.08), transparent 30%),
        linear-gradient(180deg, #fbfdff 0%, var(--content-bg) 100%);
    }

    .content::before {
      content: "";
      position: fixed;
      left: 312px;
      top: 0;
      right: 0;
      height: 320px;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(37, 99, 235, 0.040) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37, 99, 235, 0.030) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(180deg, rgba(0,0,0,0.55), transparent);
    }

    .markdown-section {
      position: relative;
      z-index: 1;
      max-width: 1040px;
      margin: 0 auto;
      padding: 44px 56px 86px;
    }

    .markdown-section h1 {
      margin: 0 0 24px;
      color: #0f172a;
      font-size: 36px;
      font-weight: 850;
      line-height: 1.3;
      letter-spacing: -0.6px;
    }

    .markdown-section h2 {
      position: relative;
      margin-top: 44px;
      margin-bottom: 18px;
      padding-left: 15px;
      border-bottom: none;
      color: #0f172a;
      font-size: 24px;
      font-weight: 780;
      line-height: 1.4;
    }

    .markdown-section h2::before {
      content: "";
      position: absolute;
      left: 0;
      top: 8px;
      width: 5px;
      height: 23px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--blue), var(--cyan));
      box-shadow: 0 0 14px rgba(56, 189, 248, 0.35);
    }

    .markdown-section h3 {
      margin-top: 30px;
      color: #1e293b;
      font-size: 19px;
      font-weight: 760;
    }

    .markdown-section p,
    .markdown-section li {
      color: var(--text-body);
      font-size: 16px;
      line-height: 1.95;
    }

    .markdown-section strong {
      color: #0f172a;
      font-weight: 760;
    }

    .markdown-section a {
      color: #2563eb;
      font-weight: 650;
      text-decoration: none;
    }

    .markdown-section a:hover {
      color: #0891b2;
      text-decoration: underline;
    }

    .markdown-section blockquote {
      margin: 24px 0;
      padding: 16px 20px;
      border-left: 4px solid #06b6d4;
      border-radius: 14px;
      background: linear-gradient(135deg, #ecfeff, #eff6ff);
      color: #164e63;
      box-shadow: var(--shadow);
    }

    .markdown-section pre {
      border-radius: 20px;
      background: linear-gradient(180deg, #08111f 0%, #0d1627 100%);
      border: 1px solid rgba(56, 189, 248, 0.18);
      box-shadow: 0 22px 60px rgba(15, 23, 42, 0.20);
    }

    .markdown-section code {
      padding: 2px 7px;
      border-radius: 7px;
      background: #e0f2fe;
      color: #075985;
      font-size: 14px;
    }

    .markdown-section pre code {
      background: transparent;
      color: #e5e7eb;
      padding: 0;
    }

    .markdown-section table {
      display: table;
      width: 100%;
      overflow: hidden;
      border-collapse: separate;
      border-spacing: 0;
      border-radius: 18px;
      background: #ffffff;
      box-shadow: var(--shadow);
      border: 1px solid rgba(56, 189, 248, 0.16);
    }

    .markdown-section th {
      background: linear-gradient(180deg, #f0f7ff, #eaf6ff);
      color: #0f172a;
      font-weight: 760;
    }

    .markdown-section td,
    .markdown-section th {
      border: 1px solid #dbe7f5;
      padding: 13px 16px;
    }

    .doc-hero {
      position: relative;
      overflow: hidden;
      margin-bottom: 30px;
      padding: 46px 46px;
      border: 1px solid rgba(56, 189, 248, 0.28);
      border-radius: 30px;
      background:
        radial-gradient(circle at 82% 16%, rgba(56, 189, 248, 0.20), transparent 28%),
        radial-gradient(circle at 8% 88%, rgba(37, 99, 235, 0.10), transparent 26%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.96) 0%, rgba(239, 247, 255, 0.96) 100%);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .doc-hero::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.36;
      background-image:
        linear-gradient(rgba(37, 99, 235, 0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37, 99, 235, 0.05) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(135deg, rgba(0,0,0,0.66), transparent 72%);
      pointer-events: none;
    }

    .doc-hero .badge {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      margin-bottom: 18px;
      padding: 8px 13px;
      border: 1px solid rgba(6, 182, 212, 0.28);
      border-radius: 999px;
      background: rgba(236, 254, 255, 0.86);
      color: #0369a1;
      font-size: 13px;
      font-weight: 760;
      box-shadow: 0 0 24px rgba(56, 189, 248, 0.14);
    }

    .doc-hero h1 {
      position: relative;
      z-index: 1;
      margin: 0 0 16px;
      color: #0f172a;
      font-size: 42px;
      line-height: 1.22;
      letter-spacing: -0.9px;
    }

    .doc-hero p {
      position: relative;
      z-index: 1;
      margin: 0;
      max-width: 760px;
      color: #334155;
      font-size: 17px;
      line-height: 1.9;
    }

    .doc-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
      margin: 28px 0;
    }

    .doc-card,
    .doc-panel {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(56, 189, 248, 0.16);
      background: var(--card-bg);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .doc-card {
      padding: 24px;
      border-radius: 24px;
      transition: all 0.18s ease;
    }

    .doc-card:hover {
      transform: translateY(-4px);
      border-color: rgba(6, 182, 212, 0.35);
      box-shadow: 0 24px 62px rgba(37, 99, 235, 0.14);
    }

    .doc-card .num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 42px;
      height: 36px;
      margin-bottom: 14px;
      padding: 0 10px;
      border-radius: 13px;
      background: linear-gradient(135deg, #2563eb, #06b6d4);
      color: #ffffff;
      font-weight: 850;
      box-shadow: 0 12px 26px rgba(37, 99, 235, 0.24);
    }

    .doc-card h3 {
      margin: 0 0 10px;
      color: #0f172a;
      font-size: 18px;
      font-weight: 760;
    }

    .doc-card p {
      margin: 0;
      color: #52657d;
      font-size: 14px;
      line-height: 1.75;
    }

    .doc-panel {
      margin: 28px 0;
      padding: 30px 34px;
      border-radius: 26px;
    }

    .lang-switch {
      position: fixed;
      right: 26px;
      top: 22px;
      z-index: 30;
      display: inline-flex;
      gap: 6px;
      padding: 6px;
      border: 1px solid rgba(125, 211, 252, 0.22);
      border-radius: 999px;
      background: rgba(8, 17, 31, 0.78);
      backdrop-filter: blur(12px);
      box-shadow: 0 18px 40px rgba(2, 8, 23, 0.22);
    }

    .lang-switch a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 50px;
      height: 30px;
      border-radius: 999px;
      color: #cbd5e1;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
    }

    .lang-switch a.active {
      color: #ffffff;
      background: linear-gradient(135deg, #2563eb, #06b6d4);
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.28);
    }

    .sidebar-toggle {
      left: 18px;
      bottom: 18px;
      width: 42px;
      height: 42px;
      border-radius: 999px;
      background: #0f172a;
      border: 1px solid rgba(125, 211, 252, 0.28);
      box-shadow: var(--glow);
    }

    .sidebar-toggle span {
      background-color: #7dd3fc;
    }

    @media screen and (max-width: 1024px) {
      .doc-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media screen and (max-width: 768px) {
      .sidebar {
        width: 282px;
      }

      .content {
        left: 0;
        padding-top: 0;
      }

      .content::before {
        left: 0;
      }

      .markdown-section {
        padding: 70px 20px 64px;
      }

      .doc-hero {
        padding: 34px 26px;
        border-radius: 24px;
      }

      .doc-hero h1 {
        font-size: 31px;
      }

      .doc-grid {
        grid-template-columns: 1fr;
      }

      .lang-switch {
        right: 16px;
        top: 16px;
      }
    }
  </style>
</head>

<body>
  <div class="lang-switch" id="langSwitch">
    <a href="#/" data-lang="zh">中文</a>
    <a href="#/en/" data-lang="en">EN</a>
  </div>

  <div id="app">加载中...</div>

  <script>
    window.$docsify = {
      name: "全栈实验室操作文档",
      repo: "",
      loadSidebar: true,
      subMaxLevel: 2,
      homepage: "README.md",
      routerMode: "hash",
      auto2top: true,
      alias: {
        "/en/.*/_sidebar.md": "/en/_sidebar.md",
        "/.*/_sidebar.md": "/_sidebar.md"
      },
      search: {
        maxAge: 86400000,
        paths: "auto",
        placeholder: {
          "/en/": "Search docs",
          "/": "搜索文档"
        },
        noData: {
          "/en/": "No results",
          "/": "没有找到结果"
        }
      }
    };

    function updateLangSwitch() {
      var hash = window.location.hash || "#/";
      var isEn = hash.indexOf("#/en") === 0;
      var links = document.querySelectorAll(".lang-switch a");
      links.forEach(function(link) {
        link.classList.toggle("active", link.dataset.lang === (isEn ? "en" : "zh"));
      });
    }

    function fixSidebarOrder() {
      var sidebar = document.querySelector(".sidebar");
      var title = document.querySelector(".sidebar h1");
      var search = document.querySelector(".sidebar .search");

      if (sidebar && title && search && title.compareDocumentPosition(search) & Node.DOCUMENT_POSITION_PRECEDING) {
        sidebar.insertBefore(title, search);
      }
    }

    window.addEventListener("hashchange", function() {
      updateLangSwitch();
      setTimeout(fixSidebarOrder, 50);
    });

    window.addEventListener("load", function() {
      updateLangSwitch();
      fixSidebarOrder();

      var count = 0;
      var timer = setInterval(function() {
        fixSidebarOrder();
        count += 1;
        if (count > 20) clearInterval(timer);
      }, 150);
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
